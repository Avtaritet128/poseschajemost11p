<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель | Журнал посещаемости</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0f172a; margin: 0; padding: 20px; color: #e2e8f0; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #38bdf8; }
        h2 { color: #94a3b8; font-size: 1.2rem; margin-top: 0; }
        .card { background: #1e293b; border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; color: #94a3b8; }
        .present { color: #4ade80; }
        .absent { color: #f87171; }
        .log-entry { font-size: 0.75rem; padding: 6px; border-bottom: 1px solid #334155; font-family: monospace; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; margin-right: 10px; margin-top: 10px; }
        button.danger { background: #ef4444; }
        button.warning { background: #f59e0b; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .sync-status { background: #334155; padding: 8px 16px; border-radius: 40px; font-size: 0.8rem; display: inline-block; margin-bottom: 15px; }
        select, input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 40px; margin: 5px; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 15px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>📊 Админ-панель журнала посещаемости</h1>
    <div class="sync-status" id="syncStatus">🔄 Подключение...</div>
    
    <div class="card">
        <h2>🔄 Управление данными</h2>
        <div class="flex">
            <button onclick="refreshData()">🔄 Обновить</button>
            <button class="warning" onclick="resetAllData()">⚠️ Сбросить ВСЕ отметки (все дни)</button>
            <button class="danger" onclick="fullReset()">🗑 ПОЛНЫЙ СБРОС (все данные + настройки)</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 Фильтр по дням</h2>
        <div class="filter-bar">
            <button class="day-filter" data-day="mon">ПН</button>
            <button class="day-filter" data-day="tue">ВТ</button>
            <button class="day-filter" data-day="wed">СР</button>
            <button class="day-filter" data-day="thu">ЧТ</button>
            <button class="day-filter" data-day="fri">ПТ</button>
            <button class="day-filter active" data-day="all">Все дни</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 Посещаемость по дням</h2>
        <div id="attendanceStats" style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;"></div>
        <div style="overflow-x: auto;">
            <table id="attendanceTable">
                <thead><tr><th>День</th><th>Предмет</th><th>Студент</th><th>Статус</th><th>Обновлено</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>⚙️ Настройки предметов и дат</h2>
        <div style="overflow-x: auto;">
            <table id="settingsTable">
                <thead><tr><th>День</th><th>Предмет</th><th>Название</th><th>Дата</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========== ВАШИ КЛЮЧИ SUPABASE (ТЕ ЖЕ, ЧТО В index.html) ==========
    const SUPABASE_URL = 'https://zkm-itre-ubdb0-cuvf5-mp0lw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_ZkmITreUbdbOCuVF5Mp0lw_H8dbnovf';  // Вставьте полный ключ!
    // ===================================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentDayFilter = 'all';
    const DAYS = { mon: 'ПН', tue: 'ВТ', wed: 'СР', thu: 'ЧТ', fri: 'ПТ' };
    const DAYS_FULL = { mon: 'Понедельник', tue: 'Вторник', wed: 'Среда', thu: 'Четверг', fri: 'Пятница' };
    const STUDENTS = [
        "Аношин Михаил Александрович","Богданович Андрей Сергеевич","Бодров Максим Вячеславович",
        "Викторов Александр Дмитриевич","Гневанов Арсений Данилович","Громов Денис Алексеевич",
        "Жороев Мухаммад Кудуратович","Зуев Андрей Алексеевич","Кулешов Матвей Сергеевич",
        "Лялин Даниил Евгеньевич","Науменко Александр Алексеевич","Нугаев Тимур Рушанович",
        "Островская Диана Андреевна","Павлов Арсений Алексеевич","Перова Кристина Игоревна",
        "Семянченков Руслан Ихтиёрович","Хохлов Егор Андреевич","Цаплин Иван Николаевич",
        "Шалагин Артём Алексеевич","Яничев Егор Андреевич"
    ];

    function getShortName(full) { let p = full.split(/\s+/); return p.length >= 2 ? `${p[0]} ${p[1]}` : full; }

    async function refreshData() {
        try {
            document.getElementById('syncStatus').textContent = '🔄 Загрузка...';
            
            let query = supabase.from('attendance_records').select('*');
            if (currentDayFilter !== 'all') {
                query = query.eq('day', currentDayFilter);
            }
            const { data: attendance, error: attError } = await query;
            if (attError) throw attError;
            
            const { data: settings, error: setError } = await supabase
                .from('subject_settings')
                .select('*');
            if (setError) throw setError;
            
            renderAttendance(attendance);
            renderSettings(settings);
            renderStats(attendance);
            
            document.getElementById('syncStatus').textContent = '✅ Данные загружены';
            setTimeout(() => {
                if (document.getElementById('syncStatus').textContent === '✅ Данные загружены') {
                    document.getElementById('syncStatus').textContent = 'Готово';
                }
            }, 2000);
        } catch(e) {
            console.error(e);
            document.getElementById('syncStatus').textContent = '❌ Ошибка загрузки';
            alert('Ошибка подключения к Supabase. Проверьте ключи и таблицы.');
        }
    }

    function renderAttendance(attendance) {
        const tbody = document.querySelector('#attendanceTable tbody');
        tbody.innerHTML = '';
        attendance.forEach(row => {
            const tr = tbody.insertRow();
            tr.insertCell(0).textContent = DAYS[row.day] || row.day;
            tr.insertCell(1).textContent = `${row.subject_index+1} пара`;
            tr.insertCell(2).textContent = getShortName(row.student_name);
            tr.insertCell(3).innerHTML = row.is_present ? '<span class="present">✅ Присутствовал</span>' : '<span class="absent">❌ Отсутствовал</span>';
            tr.insertCell(4).textContent = new Date(row.updated_at).toLocaleString();
        });
    }

    function renderSettings(settings) {
        const tbody = document.querySelector('#settingsTable tbody');
        tbody.innerHTML = '';
        settings.forEach(row => {
            const tr = tbody.insertRow();
            tr.insertCell(0).textContent = DAYS[row.day] || row.day;
            tr.insertCell(1).textContent = `${row.subject_index+1} пара`;
            tr.insertCell(2).textContent = row.subject_text || '—';
            tr.insertCell(3).textContent = row.date_text || '—';
        });
    }

    function renderStats(attendance) {
        const container = document.getElementById('attendanceStats');
        const dayStats = {};
        attendance.forEach(row => {
            if (!dayStats[row.day]) dayStats[row.day] = { total: 0, present: 0 };
            dayStats[row.day].total++;
            if (row.is_present) dayStats[row.day].present++;
        });
        
        container.innerHTML = '';
        Object.keys(DAYS).forEach(day => {
            const stat = dayStats[day] || { total: 0, present: 0 };
            const percent = stat.total > 0 ? Math.round((stat.present / stat.total) * 100) : 0;
            container.innerHTML += `
                <div style="background:#0f172a; padding:10px 15px; border-radius:20px; text-align:center;">
                    <strong>${DAYS[day]}</strong><br>
                    <span style="color:#4ade80;">${stat.present}</span> / ${stat.total}<br>
                    <span style="font-size:0.7rem;">${percent}%</span>
                </div>
            `;
        });
    }

    async function resetAllData() {
        if (!confirm('⚠️ Сбросить ВСЕ отметки посещаемости (оставить названия и даты)?')) return;
        for (let day of ['mon', 'tue', 'wed', 'thu', 'fri']) {
            for (let i = 0; i < 4; i++) {
                for (let student of STUDENTS) {
                    await supabase
                        .from('attendance_records')
                        .update({ is_present: false, updated_at: new Date() })
                        .eq('day', day)
                        .eq('subject_index', i)
                        .eq('student_name', student);
                }
            }
        }
        await refreshData();
        alert('✅ Все отметки сброшены');
    }

    async function fullReset() {
        if (!confirm('⚠️ ПОЛНЫЙ СБРОС! Это удалит ВСЕ отметки, названия предметов и даты. Вы уверены?')) return;
        
        for (let day of ['mon', 'tue', 'wed', 'thu', 'fri']) {
            for (let i = 0; i < 4; i++) {
                for (let student of STUDENTS) {
                    await supabase
                        .from('attendance_records')
                        .update({ is_present: false, updated_at: new Date() })
                        .eq('day', day)
                        .eq('subject_index', i)
                        .eq('student_name', student);
                }
            }
            for (let i = 0; i < 4; i++) {
                await supabase
                    .from('subject_settings')
                    .upsert({ day: day, subject_index: i, subject_text: '', date_text: '', updated_at: new Date() })
                    .eq('day', day)
                    .eq('subject_index', i);
            }
        }
        await refreshData();
        alert('✅ Полный сброс выполнен');
    }

    function initFilters() {
        document.querySelectorAll('.day-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.day-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDayFilter = btn.getAttribute('data-day');
                refreshData();
            });
        });
    }

    // Делаем функции глобальными для кнопок
    window.refreshData = refreshData;
    window.resetAllData = resetAllData;
    window.fullReset = fullReset;
    
    initFilters();
    refreshData();
</script>
</body>
</html>
