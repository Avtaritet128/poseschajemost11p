<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Журнал посещаемости</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Inter', sans-serif;
        }
        body {
            background: #eef2f8;
            margin: 0;
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-dashboard {
            max-width: 1600px;
            width: 100%;
            background: white;
            border-radius: 36px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .journal-header {
            background: #0f2b3d;
            padding: 1.2rem 2rem;
            color: white;
        }
        .journal-header h1 {
            margin: 0;
            font-size: 1.7rem;
        }
        .journal-header p {
            margin: 0.4rem 0 0;
            opacity: 0.75;
            font-size: 0.9rem;
        }
        .top-control-panel {
            background: #ffffff;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #e4e9f0;
        }
        .mark-card {
            background: #f7f9fc;
            border-radius: 28px;
            padding: 1rem 1.6rem;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }
        .input-group {
            flex: 2;
            min-width: 200px;
        }
        .input-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c3e5c;
            margin-bottom: 4px;
            display: block;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 60px;
            border: 1px solid #cbdae9;
            font-size: 0.9rem;
            background: white;
        }
        .double-buttons {
            display: flex;
            gap: 12px;
        }
        .mark-btn {
            background: #1f3b4c;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.15s;
        }
        .mark-btn:hover {
            transform: scale(0.97);
        }
        .mark-btn.remove-mode {
            background: #8b3c3c;
        }
        .action-bar {
            background: #f9fbfd;
            padding: 0.8rem 2rem;
            border-bottom: 1px solid #e4e9f0;
            display: flex;
            justify-content: flex-end;
            gap: 16px;
        }
        .reset-btn, .clear-storage-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e6;
            padding: 7px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .clear-storage-btn {
            background: #fff1f0;
            border-color: #fbc4c1;
            color: #b13e3e;
        }
        .two-columns {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            padding: 1.8rem 2rem;
        }
        .left-grid {
            flex: 2;
            min-width: 280px;
            overflow-x: auto;
        }
        .right-summary {
            flex: 1.4;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }
        .attend-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 680px;
        }
        .attend-table th {
            background: #f8fafc;
            padding: 14px 8px;
            font-weight: 600;
            border-bottom: 2px solid #dee4ec;
            text-align: left;
        }
        .attend-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #edf2f7;
        }
        .student-fullname {
            font-weight: 550;
            color: #0a1c2f;
            white-space: nowrap;
        }
        .badge-present {
            background: #dcfce7;
            color: #15803d;
            font-weight: 600;
            border-radius: 32px;
            padding: 4px 10px;
            display: inline-block;
            font-size: 0.7rem;
            min-width: 110px;
            text-align: center;
        }
        .badge-absent {
            background: #fee9e6;
            color: #b91c1c;
            font-weight: 600;
            border-radius: 32px;
            padding: 4px 10px;
            display: inline-block;
            font-size: 0.7rem;
            min-width: 110px;
            text-align: center;
        }
        .subject-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        .subject-name {
            font-size: 0.85rem;
            font-weight: 700;
        }
        .subject-stats {
            font-size: 0.65rem;
            background: #e9edf2;
            padding: 2px 8px;
            border-radius: 40px;
            color: #1e3a5f;
        }
        .action-icons {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 5px;
        }
        .icon-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 3px 10px;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
        }
        .icon-btn.add { background: #e6f7e6; color: #2b6e2f; }
        .icon-btn.remove { background: #ffe6e5; color: #b13e3e; }
        .summary-card {
            background: #fefefe;
            border-radius: 24px;
            border: 1px solid #e9edf2;
        }
        .card-header {
            background: #f1f5f9;
            padding: 12px 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }
        .card-header .counter {
            background: white;
            border-radius: 40px;
            padding: 2px 10px;
            font-size: 0.7rem;
        }
        .split-lists { padding: 12px 16px; }
        .present-title { color: #15803d; font-weight: 600; font-size: 0.7rem; margin-bottom: 8px; }
        .absent-title { color: #b91c1c; font-weight: 600; font-size: 0.7rem; margin-bottom: 8px; }
        .student-tag {
            background: #f8fafc;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            margin: 4px 6px 4px 0;
            display: inline-block;
            border: 1px solid #cbd5e1;
            cursor: grab;
        }
        .student-tag:active { cursor: grabbing; }
        .drop-zone { min-height: 60px; border-radius: 16px; padding: 4px 0; }
        .drop-zone.drag-over { background: #eef2ff; }
        .legend-bottom {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 1rem 2rem;
            background: #f9fbfd;
            border-top: 1px solid #e4e9f0;
            font-size: 0.8rem;
        }
        .empty-message { color: #94a3b8; padding: 8px 0; font-style: italic; font-size: 0.7rem; }
        @media (max-width: 900px) { .two-columns { flex-direction: column; } }
    </style>
</head>
<body>
<div class="main-dashboard">
    <div class="journal-header">
        <h1>📋 Журнал посещаемости</h1>
        <p></p>
    </div>
    <div class="top-control-panel">
        <div class="mark-card">
            <div class="flex-row">
                <div class="input-group">
                    <label>Фамилия и Имя</label>
                    <input type="text" id="studentNameField" placeholder="Например: Островская Диана" list="studentsDatalist" autocomplete="off">
                    <datalist id="studentsDatalist"></datalist>
                </div>
                <div class="input-group">
                    <label>Предмет</label>
                    <select id="subjectPairSelect">
                        <option value="literature">📖 Литература</option>
                        <option value="mathematics">📐 Математика</option>
                        <option value="language">🌍 Иностранный язык</option>
                    </select>
                </div>
                <div class="double-buttons">
                    <button class="mark-btn" id="markPresentBtn">➕ Присутствовал(а)</button>
                    <button class="mark-btn remove-mode" id="markAbsentBtn">➖ Отсутствовал(а)</button>
                </div>
            </div>
        </div>
    </div>
    <div class="action-bar">
        <button class="reset-btn" id="globalResetBtn">⟳ Сбросить все отметки</button>
        <button class="clear-storage-btn" id="clearStorageBtn">🗑 Очистить сохранённые данные</button>
    </div>
    <div class="two-columns">
        <div class="left-grid">
            <table class="attend-table" id="mainTable">
                <thead><tr><th>👥 Студент</th><th><div class="subject-header"><div class="subject-name">📖 Литература</div><div class="subject-stats" id="litStatBadge">0/20</div></div></th><th><div class="subject-header"><div class="subject-name">📐 Математика</div><div class="subject-stats" id="mathStatBadge">0/20</div></div></th><th><div class="subject-header"><div class="subject-name">🌍 Иностранный язык</div><div class="subject-stats" id="langStatBadge">0/20</div></div></th></tr></thead>
                <tbody id="tableDynamicBody"></tbody>
            </table>
        </div>
        <div class="right-summary" id="summaryContainer"></div>
    </div>
    <div class="legend-bottom">
        
    </div>
</div>
<script>
    const FULL_STUDENT_LIST = [
        "Аношин Михаил Александрович","Богданович Андрей Сергеевич","Бодров Максим Вячеславович",
        "Викторов Александр Дмитриевич","Гневанов Арсений Данилович","Громов Денис Алексеевич",
        "Жороев Мухаммад Кудуратович","Зуев Андрей Алексеевич","Кулешов Матвей Сергеевич",
        "Лялин Даниил Евгеньевич","Науменко Александр Алексеевич","Нугаев Тимур Рушанович",
        "Островская Диана Андреевна","Павлов Арсений Алексеевич","Перова Кристина Игоревна",
        "Семянченков Руслан Ихтиёрович","Хохлов Егор Андреевич","Цаплин Иван Николаевич",
        "Шалагин Артём Алексеевич","Яничев Егор Андреевич"
    ];
    function getShortName(full) { let p = full.trim().split(/\s+/); return (p.length>=2) ? `${p[0]} ${p[1]}` : full; }
    const shortToFull = new Map(); FULL_STUDENT_LIST.forEach(full => shortToFull.set(getShortName(full), full));
    const SHORT_NAMES_LIST = FULL_STUDENT_LIST.map(full => getShortName(full));
    let attendanceRecords = [];
    const STORAGE_KEY = 'attendanceRecords_v1';
    function saveToLocalStorage() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(attendanceRecords.map(r=>({fullName:r.fullName, literature:r.literature, mathematics:r.mathematics, language:r.language})))); } catch(e){} }
    function loadFromLocalStorage() { let saved = localStorage.getItem(STORAGE_KEY); if(!saved) return null; try { let parsed = JSON.parse(saved); if(Array.isArray(parsed) && parsed.length===FULL_STUDENT_LIST.length) { let valid=true; for(let i=0;i<FULL_STUDENT_LIST.length;i++) if(parsed[i].fullName!==FULL_STUDENT_LIST[i]) { valid=false; break; } if(valid) return parsed; } return null; } catch(e){ return null; } }
    function initData() { let saved=loadFromLocalStorage(); if(saved) attendanceRecords=saved; else attendanceRecords=FULL_STUDENT_LIST.map(fullName=>({fullName, literature:false, mathematics:false, language:false})); }
    function updateHeaderStats() { let lit=0,math=0,lang=0; for(let s of attendanceRecords) { if(s.literature) lit++; if(s.mathematics) math++; if(s.language) lang++; } document.getElementById('litStatBadge').innerText=`${lit}/20`; document.getElementById('mathStatBadge').innerText=`${math}/20`; document.getElementById('langStatBadge').innerText=`${lang}/20`; }
    function renderSubjectCell(fullName,subjectKey,isPresent) { let statusText=isPresent?'Присутствовал(а)':'Отсутствовал(а)'; let badgeClass=isPresent?'badge-present':'badge-absent'; return `<div style="text-align:center"><div class="${badgeClass}">${statusText}</div><div class="action-icons"><button class="icon-btn add" data-fullname="${escapeHtml(fullName)}" data-subject="${subjectKey}">➕</button><button class="icon-btn remove" data-fullname="${escapeHtml(fullName)}" data-subject="${subjectKey}">➖</button></div></div>`; }
    function renderMainTable() { let tbody=document.getElementById('tableDynamicBody'); if(!tbody) return; tbody.innerHTML=''; for(let s of attendanceRecords) { let row=tbody.insertRow(); row.insertCell(0).innerHTML=`<span class="student-fullname">${escapeHtml(getShortName(s.fullName))}</span>`; row.insertCell(1).innerHTML=renderSubjectCell(s.fullName,'literature',s.literature); row.insertCell(2).innerHTML=renderSubjectCell(s.fullName,'mathematics',s.mathematics); row.insertCell(3).innerHTML=renderSubjectCell(s.fullName,'language',s.language); } updateHeaderStats(); bindInlineButtons(); }
    function setAttendanceStatus(fullName,subjectKey,isPresent) { let student=attendanceRecords.find(s=>s.fullName===fullName); if(!student || student[subjectKey]===isPresent) return false; student[subjectKey]=isPresent; renderMainTable(); renderDraggableSummaries(); saveToLocalStorage(); return true; }
    function renderDraggableSummaries() { let container=document.getElementById('summaryContainer'); if(!container) return; let subjects=[{key:'literature',title:'📖 Литература'},{key:'mathematics',title:'📐 Математика'},{key:'language',title:'🌍 Иностранный язык'}]; let html=''; for(let sub of subjects) { let present=[], absent=[]; for(let s of attendanceRecords) { let short=getShortName(s.fullName); if(s[sub.key]) present.push(short); else absent.push(short); } html+=`<div class="summary-card" data-subject="${sub.key}"><div class="card-header"><span>${sub.title}</span><span class="counter">${present.length}/20</span></div><div class="split-lists"><div class="present-block"><div class="present-title">✅ ПРИСУТСТВОВАЛ(А)</div><div class="drop-zone" data-zone-type="present" data-subject="${sub.key}">${present.length===0?'<div class="empty-message">— перетащите сюда —</div>':present.map(n=>`<span class="student-tag" draggable="true" data-name="${escapeHtml(n)}" data-subject="${sub.key}" data-status="present">${escapeHtml(n)}</span>`).join('')}</div></div><div class="absent-block"><div class="absent-title">❌ ОТСУТСТВОВАЛ(А)</div><div class="drop-zone" data-zone-type="absent" data-subject="${sub.key}">${absent.length===0?'<div class="empty-message">— перетащите сюда —</div>':absent.map(n=>`<span class="student-tag" draggable="true" data-name="${escapeHtml(n)}" data-subject="${sub.key}" data-status="absent">${escapeHtml(n)}</span>`).join('')}</div></div></div></div>`; } container.innerHTML=html; attachDragAndDropEvents(); }
    let draggedItem=null;
    function attachDragAndDropEvents() { document.querySelectorAll('.student-tag').forEach(el=>{ el.setAttribute('draggable','true'); el.ondragstart=e=>{ draggedItem={shortName:el.getAttribute('data-name'), subjectKey:el.getAttribute('data-subject'), sourceStatus:el.getAttribute('data-status')}; e.dataTransfer.setData('text/plain',draggedItem.shortName); el.style.opacity='0.5'; }; el.ondragend=e=>{ el.style.opacity=''; draggedItem=null; document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('drag-over')); }; }); document.querySelectorAll('.drop-zone').forEach(zone=>{ zone.ondragover=e=>{ e.preventDefault(); zone.classList.add('drag-over'); }; zone.ondragleave=e=>zone.classList.remove('drag-over'); zone.ondrop=e=>{ e.preventDefault(); zone.classList.remove('drag-over'); if(!draggedItem) return; let targetType=zone.getAttribute('data-zone-type'), targetSubject=zone.getAttribute('data-subject'); if(draggedItem.subjectKey!==targetSubject){ showToast('Нельзя перемещать между разными предметами','#a13e3e'); return; } if((draggedItem.sourceStatus==='present' && targetType==='present')||(draggedItem.sourceStatus==='absent' && targetType==='absent')){ showToast('Студент уже в этом списке','#64748b'); return; } let fullName=shortToFull.get(draggedItem.shortName); if(!fullName) return; let newStatus=targetType==='present'; let student=attendanceRecords.find(s=>s.fullName===fullName); if(student && student[draggedItem.subjectKey]!==newStatus){ student[draggedItem.subjectKey]=newStatus; renderMainTable(); renderDraggableSummaries(); saveToLocalStorage(); showToast(`${draggedItem.shortName} теперь ${newStatus?'присутствует':'отсутствует'}`,newStatus?'#1f5e3a':'#a13e3e'); } }; }); }
    function showToast(msg,bg){ let t=document.createElement('div'); t.textContent=msg; t.style.cssText=`position:fixed; bottom:20px; left:20px; background:${bg}; color:white; padding:8px 20px; border-radius:40px; font-size:0.8rem; z-index:999;`; document.body.appendChild(t); setTimeout(()=>t.remove(),1800); }
    function bindInlineButtons(){ document.querySelectorAll('.icon-btn.add').forEach(btn=>{ btn.onclick=()=>setAttendanceStatus(btn.getAttribute('data-fullname'),btn.getAttribute('data-subject'),true); }); document.querySelectorAll('.icon-btn.remove').forEach(btn=>{ btn.onclick=()=>setAttendanceStatus(btn.getAttribute('data-fullname'),btn.getAttribute('data-subject'),false); }); }
    function resetAll(){ if(confirm('Сбросить все отметки?')){ attendanceRecords.forEach(s=>{ s.literature=false; s.mathematics=false; s.language=false; }); renderMainTable(); renderDraggableSummaries(); saveToLocalStorage(); showToast('✨ Вся посещаемость сброшена','#2c3e5c'); } }
    function clearAllSavedData(){ if(confirm('Очистить сохранённые данные?')){ localStorage.removeItem(STORAGE_KEY); attendanceRecords=FULL_STUDENT_LIST.map(n=>({fullName:n, literature:false, mathematics:false, language:false})); renderMainTable(); renderDraggableSummaries(); saveToLocalStorage(); showToast('🗑 Данные очищены','#8b3c3c'); } }
    function findFullByInput(input){ let t=input.trim(); if(shortToFull.has(t)) return shortToFull.get(t); let lower=t.toLowerCase(), match=SHORT_NAMES_LIST.find(n=>n.toLowerCase()===lower); if(match) return shortToFull.get(match); let partial=SHORT_NAMES_LIST.filter(n=>n.toLowerCase().includes(lower)); return partial.length===1? shortToFull.get(partial[0]):null; }
    function initPanelControls(){ let presentBtn=document.getElementById('markPresentBtn'), absentBtn=document.getElementById('markAbsentBtn'), nameInput=document.getElementById('studentNameField'), subjectSelect=document.getElementById('subjectPairSelect'); presentBtn.onclick=()=>{ let raw=nameInput.value.trim(); if(!raw){alert('Введите фамилию и имя');return;} let full=findFullByInput(raw); if(!full){alert('Студент не найден');return;} setAttendanceStatus(full,subjectSelect.value,true); nameInput.value=getShortName(full); }; absentBtn.onclick=()=>{ let raw=nameInput.value.trim(); if(!raw){alert('Введите фамилию и имя');return;} let full=findFullByInput(raw); if(!full){alert('Студент не найден');return;} setAttendanceStatus(full,subjectSelect.value,false); nameInput.value=getShortName(full); }; }
    function populateDatalist(){ let dl=document.getElementById('studentsDatalist'); if(dl){ dl.innerHTML=''; SHORT_NAMES_LIST.forEach(n=>{ let opt=document.createElement('option'); opt.value=n; dl.appendChild(opt); }); } }
    function escapeHtml(str){ return str.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function init(){ initData(); populateDatalist(); renderMainTable(); renderDraggableSummaries(); initPanelControls(); document.getElementById('globalResetBtn').onclick=resetAll; document.getElementById('clearStorageBtn').onclick=clearAllSavedData; }
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
